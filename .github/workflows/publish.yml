name: Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install || npm install --no-audit --no-fund

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MA MI PA <<< "$CURRENT"
          NEW="$MA.$MI.$((PA+1))"
          node -e "const f='./package.json';const p=require(f);p.version='$NEW';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n');"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          git add package.json
          git commit -m "chore(release): v$NEW [skip ci]" || true
          git tag "v$NEW"
          git push origin HEAD --tags

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public || echo "npm publish failed (token may be unset on first run)"
          else
            echo "NPM_TOKEN secret not set — skipping npm publish. Set it under repo secrets to enable."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
